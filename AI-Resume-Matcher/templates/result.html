<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-bubbles">
        <span>🎯</span>
        <span>📄</span>
        <span>🤖</span>
        <span>⭐</span>
        <span>🚀</span>
    </div>

    <div class="container">
        <div class="card cartoon-card result-card">
            <div class="hero-icon">🎯</div>
            <h1>Match Result</h1>

            <div class="score">{{ score }}%</div>

            {% if score >= 75 %}
                <p class="status good">🌟 Excellent Match</p>
            {% elif score >= 50 %}
                <p class="status average">👍 Good Match</p>
            {% else %}
                <p class="status low">😅 Low Match</p>
            {% endif %}

            <a href="/" class="back-btn">🔄 Try Another Resume</a>
        </div>
    </div>
</body>
</html>
